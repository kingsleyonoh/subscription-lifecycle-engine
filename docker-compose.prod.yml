services:
  sle:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    expose:
      - "4000"
    networks:
      - traefik-public
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sle.rule=Host(`subscriptions.kingsleyonoh.com`)"
      - "traefik.http.routers.sle.entrypoints=websecure"
      - "traefik.http.routers.sle.tls.certresolver=letsencrypt"
      - "traefik.http.services.sle.loadbalancer.server.port=4000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sle_password}
      POSTGRES_DB: sle_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sle -d sle_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  traefik-public:
    external: true
