services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5443}:5432"
    environment:
      POSTGRES_USER: sle
      POSTGRES_PASSWORD: sle_password
      POSTGRES_DB: sle_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./priv/repo/init-test-db.sql:/docker-entrypoint-initdb.d/01-init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sle -d sle_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
